<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAXIS STRIKE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; }
        #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; z-index: 10; }
        .top-bar { display: flex; justify-content: center; gap: 50px; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .team-score { background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 10px; border: 2px solid #444; }
        .team-t { color: #ff4444; border-color: #ff4444 !important; }
        .team-ct { color: #4444ff; border-color: #4444ff !important; }
        .bottom-bar { display: flex; justify-content: space-between; align-items: flex-end; }
        .health-container { display: flex; flex-direction: column; gap: 5px; }
        .health-bar-container { width: 200px; height: 20px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        #health-fill { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #00ff00); transition: width 0.3s ease; }
        .ammo-counter { font-size: 32px; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 10px; }
        #menu { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 40px; text-align: center; border-radius: 20px; border: 3px solid #fff; pointer-events: auto; z-index: 100; }
        h1 { font-size: 64px; margin: 0 0 20px 0; color: #fff; text-transform: uppercase; letter-spacing: 5px; }
        .menu-btns { display: flex; gap: 20px; justify-content: center; }
        button { padding: 15px 40px; font-size: 24px; cursor: pointer; background: #fff; border: none; border-radius: 5px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #ccc; transform: scale(1.1); }
        .btn-t { color: #ff4444; border: 2px solid #ff4444; background: transparent; }
        .btn-t:hover { background: #ff4444; color: white; }
        .btn-ct { color: #4444ff; border: 2px solid #4444ff; background: transparent; }
        .btn-ct:hover { background: #4444ff; color: white; }
    </style>
</head>
<body>
    <div id="menu">
        <h1>MAXIS STRIKE</h1>
        <p>Choose your side to enter the battle</p>
        <div class="menu-btns">
            <button class="btn-t" onclick="joinGame('T')">JOIN T</button>
            <button class="btn-ct" onclick="joinGame('CT')">JOIN CT</button>
        </div>
    </div>

    <div id="ui-overlay">
        <div class="top-bar">
            <div class="team-score team-t">T: <span id="score-t">0</span></div>
            <div id="timer">01:30</div>
            <div class="team-score team-ct">CT: <span id="score-ct">0</span></div>
        </div>
        <div class="bottom-bar">
            <div class="health-container">
                <span>HEALTH</span>
                <div class="health-bar-container">
                    <div id="health-fill"></div>
                </div>
            </div>
            <div class="ammo-counter"><span id="ammo">30</span> / <span id="reserve">90</span></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script src="impact-engine/core.js"></script>
    <script src="impact-engine/physics.js"></script>
    <script src="impact-engine/entities.js"></script>
    <script src="impact-engine/renderer.js"></script>
    <script src="impact-engine/engine.js"></script>

    <script>
        const socket = io();
        let myTeam = null;
        let gameStarted = false;

        function joinGame(team) {
            myTeam = team;
            document.getElementById('menu').style.display = 'none';
            socket.emit('join', { team: team });

            try {
                window.gameEngine = new GameEngine('gameCanvas');
                window.gameEngine.start();
                gameStarted = true;
                console.log('GameEngine started successfully');
            } catch (e) {
                console.error('Engine failed to start:', e);
            }
        }

        socket.on('state', (data) => {
            if (gameStarted && window.gameEngine) {
                window.gameEngine.updateWorld(data.players);
            }
            if (data.scores) {
                document.getElementById('score-t').innerText = data.scores.t;
                document.getElementById('score-ct').innerText = data.scores.ct;
            }
            if (data.timer) {
                document.getElementById('timer').innerText = data.timer;
            }
        });

        socket.on('playerUpdate', (update) => {
            if (update.id === socket.id && update.health !== undefined) {
                document.getElementById('health-fill').style.width = update.health + '%';
            }
        });

        socket.on('gameEnd', (winner) => {
            alert('Game Over! Winner: ' + winner);
            location.reload();
        });
    </script>
</body>
</html>
